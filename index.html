<script>
// ... [Existing variables and functions] ...

function startScanner() {
  document.getElementById('scanner-overlay').classList.remove('hidden');
  setScanStatus('Requesting camera...', true);
  
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setScanStatus('Camera API not supported', true);
    return;
  }

  navigator.mediaDevices.getUserMedia({ 
    video: { facingMode: { ideal: 'environment' } } 
  })
    .then(function(stream) {
      var video = document.getElementById('scanner-video');
      video.srcObject = stream;
      video.play();
      setScanStatus('Camera active - aim at barcode', true);
      
      if('BarcodeDetector' in window) {
        // Barcode scanning logic
      } else {
        setScanStatus('Scanner not supported', true);
      }
    })
    .catch(function(e) {
      // THIS WILL SHOW THE ACTUAL ERROR ON SCREEN
      setScanStatus('Camera Error: ' + e.name + ' - ' + e.message, true);
      console.error('Camera Error:', e);
    });
}

// ... [Rest of your script] ...
</script>
</body>
