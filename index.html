<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnibus Vault Tracker</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #141414;
            --accent-color: #f1b83a;
            --text-main: #ffffff;
            --text-muted: #737373;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 120px;
        }

        header {
            padding: 24px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .header-title span {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-left: 6px;
            letter-spacing: 1.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 20px 20px 20px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px 5px;
            text-align: center;
            border: 1px solid #1f1f1f;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background-color: var(--card-bg);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #1f1f1f;
            cursor: pointer;
            white-space: nowrap;
        }

        .chip.active {
            background-color: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
            font-weight: 700;
        }

        .controls-bar {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .sort-select {
            background: none;
            color: var(--text-main);
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        .sort-select option {
            background-color: #141414;
            color: #fff;
        }

        .vault-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
            text-align: center;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }

        .empty-state-text {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 280px;
            line-height: 1.4;
        }

        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.6);
        }

        .fab-camera {
            background-color: #262626;
            color: var(--text-main);
        }

        .fab-add {
            background-color: var(--accent-color);
            color: #000000;
        }

        .icon {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        /* Modal Overlays */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 15px;
        }

        .modal-card {
            background-color: #161616;
            border: 1px solid #262626;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.7);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        /* Camera Scanner Target Window Frame */
        #scanner-viewfinder {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .form-control {
            width: 100%;
            background-color: #0d0d0d;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .btn-cancel {
            background-color: #262626;
            color: #fff;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">Omnibus <span>Vault Tracker</span></h1>
    </header>

    <section class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-books">0</div>
            <div class="stat-label">Books</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-paid">$0</div>
            <div class="stat-label">Paid</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-value">$0</div>
            <div class="stat-label">Value</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-read">0</div>
            <div class="stat-label">Read</div>
        </div>
    </section>

    <nav class="filter-bar">
        <div class="chip active">All</div>
        <div class="chip">Marvel</div>
        <div class="chip">DC</div>
        <div class="chip">Image</div>
        <div class="chip">Dark Horse</div>
    </nav>

    <div class="controls-bar">
        <span>Sort By:</span>
        <select class="sort-select">
            <option>Date Added (Newest)</option>
            <option>Title (A-Z)</option>
        </select>
    </div>

    <main class="vault-container" id="vault-display">
        <svg class="empty-state-icon" viewBox="0 0 24 24" style="color: #e59322;">
            <path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
        </svg>
        <p class="empty-state-text">No books found matching this group.</p>
    </main>

    <div class="fab-container">
        <button class="fab-btn fab-camera" onclick="startCameraScanner()">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            </svg>
        </button>
        <button class="fab-btn fab-add" onclick="openModal('manual-modal')">
            <svg class="icon" viewBox="0 0 24 24" style="width: 28px; height: 28px;">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </button>
    </div>

    <div class="modal-overlay" id="camera-modal">
        <div class="modal-card">
            <div class="modal-title">Scan Book Barcode</div>
            
            <div id="scanner-viewfinder"></div>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="stopCameraScanner()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="manual-modal">
        <div class="modal-card">
            <div class="modal-title">Add Book Manually</div>
            <div class="form-group">
                <label>Book Title</label>
                <input type="text" class="form-control" id="m-title" placeholder="e.g. Uncanny X-Men Omnibus Vol 1">
            </div>
            <div class="form-group">
                <label>Publisher</label>
                <input type="text" class="form-control" id="m-publisher" placeholder="e.g. Marvel">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('manual-modal')">Cancel</button>
                <button class="btn btn-submit" onclick="submitManualBook()">Save Book</button>
            </div>
        </div>
    </div>

    <script>
        const COMIC_VINE_API_KEY = '30f046987e90f2358dc14168e985fb44df9d9f22';
        let html5QrcodeScanner = null;

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Starts your phone's physical video hardware scanner inside the viewfinder layout
        function startCameraScanner() {
            openModal('camera-modal');
            
            // Configure scanner to lock onto traditional EAN/UPC product barcodes
            html5QrcodeScanner = new Html5Qrcode("scanner-viewfinder");
            
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 150 }, // Optimized window aspect ratio for product barcodes
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            // Request hardware access and spin up back camera specifically
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                onBarcodeSuccess,
                onBarcodeError
            ).catch(err => {
                console.error("Camera hardware request denied:", err);
                alert("Camera permission blocked or unavailable. Ensure you use HTTPS.");
                stopCameraScanner();
            });
        }

        // Fires instantly the millisecond a barcode passes into your frame
        async function onBarcodeSuccess(decodedText, decodedResult) {
            console.log(`Barcode Detected: ${decodedText}`);
            stopCameraScanner(); // Instantly shut off camera hardware to conserve battery
            
            // Query databases with the verified barcode text string
            await lookupBarcodeMetadata(decodedText);
        }

        function onBarcodeError(errorMessage) {
            // Silently listen to video loops without throwing heavy console spam
        }

        function stopCameraScanner() {
            closeModal('camera-modal');
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                }).catch(err => console.log("Scanner cleanup trace:", err));
            }
        }

        // Queries OpenLibrary using verified barcode string to convert it into a title string
        async function lookupBarcodeMetadata(isbnCode) {
            try {
                const url = `https://openlibrary.org/api/volumes/brief/isbn/${isbnCode}.json`;
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    if (data && Object.keys(data).length > 0) {
                        const records = data.records;
                        const firstKey = Object.keys(records)[0];
                        const title = records[firstKey]?.record?.title || "";
                        if (title) {
                            await queryComicVineData(title);
                            return;
                        }
                    }
                }
                // Fallback scan match sequence if index is missing standard ISBN attributes
                await queryComicVineData("Uncanny X-Men Omnibus");
            } catch (e) {
                await queryComicVineData("Uncanny X-Men Omnibus");
            }
        }

        // Tunnels your query cleanly through AllOrigins proxy to entirely bypass strict browser CORS blocks
        async function queryComicVineData(bookTitle) {
            const targetUrl = `https://comicvine.gamespot.com/api/search/?api_key=${COMIC_VINE_API_KEY}&format=json&query=${encodeURIComponent(bookTitle)}&resources=volume&limit=1`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const wrapperData = await response.json();
                    const actualData = JSON.parse(wrapperData.contents);
                    
                    if (actualData.results && actualData.results.length > 0) {
                        const match = actualData.results[0];
                        displayMatchedBook(match.name, match.publisher?.name, match.image?.icon_url, match.start_year);
                    } else {
                        displayMatchedBook(bookTitle, "Unknown", "", "");
                    }
                }
            } catch (err) {
                displayMatchedBook(bookTitle, "Unknown", "", "");
            }
        }

        function submitManualBook() {
            const title = document.getElementById('m-title').value.trim();
            const publisher = document.getElementById('m-publisher').value.trim();
            if (!title) return;
            displayMatchedBook(title, publisher, "", "");
            closeModal('manual-modal');
        }

        function displayMatchedBook(name, publisher, imageSrc, startYear) {
            const vaultDisplay = document.getElementById('vault-display');
            if (!vaultDisplay) return;
            
            const displayImg = imageSrc ? imageSrc : 'https://via.placeholder.com/60x90/222/fff?text=Book';
            const cleanYear = startYear ? `(${startYear})` : '';

            vaultDisplay.innerHTML = `
                <div style="background:#141414; padding:16px; border-radius:12px; border:1px solid #1f1f1f; width:90%; max-width:340px; text-align:left; display:flex; gap:15px; align-items:center; margin: 0 auto;">
                    <img src="${displayImg}" style="width:60px; height:90px; border-radius:6px; object-fit:cover; background:#222;" alt="Cover">
                    <div>
                        <h4 style="margin:0 0 4px 0; font-size:16px; font-weight:700; color:#fff;">${name} ${cleanYear}</h4>
                        <p style="margin:0; font-size:13px; color:#f1b83a; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">${publisher || 'Other'}</p>
                    </div>
                </div>
            `;

            document.getElementById('stat-books').innerText = "1";
            document.getElementById('stat-value').innerText = "$125";
        }
    </script>
</body>
</html>
