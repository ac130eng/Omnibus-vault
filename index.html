<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Omnibus">
<meta name="theme-color" content="#0f0e0d">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Omnibus Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0d;--bg2:#1a1917;--bg3:#242320;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0ede8;--muted:#7a7773;--accent:#e8a230;--success:#4caf7d;--danger:#e05555;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--r:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg3)}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.topbar{padding:env(safe-area-inset-top,12px) 16px 0;background:var(--bg)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--border)}
.logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1}
.logo span{color:var(--muted);font-size:13px;font-family:var(--font-body);font-weight:300;letter-spacing:1px;display:block;margin-top:-2px}
.icon-btn{width:36px;height:36px;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:18px}
.icon-btn:active{background:var(--bg3)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--bg);padding:10px 8px;text-align:center}
.stat-n{font-family:var(--font-display);font-size:22px;color:var(--accent);letter-spacing:1px}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:1px}
.filterbar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.filterbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer}
.chip.active{background:var(--accent);border-color:var(--accent);color:#0f0e0d;font-weight:500}
.sortrow{display:flex;align-items:center;gap:8px;padding:8px 16px 6px;border-bottom:1px solid var(--border)}
.sort-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
select.sort-select{background:transparent;border:none;color:var(--muted);font-size:12px;font-family:var(--font-body);cursor:pointer;appearance:none}
.list{flex:1;overflow-y:auto;padding:8px 16px 100px}
.book-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;position:relative}
.book-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pub-color,var(--border2))}
.book-main{display:flex;align-items:flex-start;gap:12px;padding:12px 12px 10px 16px}
.book-info{flex:1;min-width:0}
.book-title{font-weight:500;font-size:14px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.book-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.pub-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;border:1px solid}
.cond-badge{font-size:10px;padding:2px 7px;border-radius:4px;color:var(--muted);border:1px solid var(--border2)}
.read-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.book-price-col{text-align:right;flex-shrink:0}
.price-paid{font-size:11px;color:var(--muted)}
.price-market{font-size:15px;font-weight:500;color:var(--success)}
.price-diff{font-size:10px;margin-top:1px}
.price-lookup-btn{font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--muted);cursor:pointer;white-space:nowrap}
.price-loading{font-size:11px;color:var(--muted);font-style:italic}
.book-footer{border-top:1px solid var(--border);padding:7px 12px 7px 16px;display:flex;align-items:center;justify-content:space-between}
.date-tag{font-size:11px;color:var(--muted)}
.book-actions{display:flex;gap:6px}
.action-btn{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer}
.action-btn.del{border-color:rgba(224,85,85,0.3);color:var(--danger)}
.action-btn:active{background:var(--bg3)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.3}
.empty-text{font-size:14px;line-height:1.6}
.fab-group{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);right:20px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:100}
.fab{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab:active{transform:scale(0.94)}
.fab-main{background:var(--accent);color:#0f0e0d;font-size:28px;box-shadow:0 4px 20px rgba(232,162,48,0.4)}
.fab-scan{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:22px;box-shadow:0 2px 12px rgba(0,0,0,0.4)}
.scanner-overlay{position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scanner-overlay.hidden{display:none}
.scanner-header{position:absolute;top:0;left:0;right:0;padding:env(safe-area-inset-top,16px) 16px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent)}
.scanner-title{font-family:var(--font-display);font-size:22px;letter-spacing:2px;color:var(--accent)}
.scanner-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#scanner-video{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;width:260px;height:120px;border:2px solid var(--accent);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.55)}
.scan-line{position:absolute;width:240px;height:2px;background:var(--accent);opacity:0.8;animation:scanline 2s ease-in-out infinite}
@keyframes scanline{0%,100%{top:20px}50%{top:90px}}
.scan-hint{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 60px);color:rgba(255,255,255,0.6);font-size:13px;text-align:center;padding:0 32px;line-height:1.5}
.scan-status{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 100px);background:rgba(0,0,0,0.8);border:1px solid var(--border2);border-radius:8px;padding:8px 16px;color:var(--text);font-size:13px;display:none;text-align:center;max-width:300px}
.scan-status.show{display:block}
.manual-isbn-btn{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);background:rgba(232,162,48,0.15);border:1px solid rgba(232,162,48,0.4);color:#e8a230;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-family:var(--font-body)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:var(--bg2);border-radius:16px 16px 0 0;z-index:201;transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px)}
.drawer.open{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 4px}
.drawer-title{font-family:var(--font-display);font-size:22px;letter-spacing:1px;color:var(--accent);padding:8px 20px 14px;display:flex;align-items:center;gap:10px}
.isbn-badge{font-size:11px;font-family:var(--font-body);background:rgba(232,162,48,0.15);border:1px solid rgba(232,162,48,0.3);color:var(--accent);padding:3px 8px;border-radius:4px;letter-spacing:0}
.drawer-body{padding:0 20px;max-height:70vh;overflow-y:auto}
.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:15px;padding:10px 12px}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.submit-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--r);color:#0f0e0d;font-family:var(--font-display);font-size:20px;letter-spacing:2px;cursor:pointer;margin:16px 0 8px}
.submit-btn:active{opacity:0.85}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 18px;font-size:13px;color:var(--text);z-index:500;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.pub-marvel{--pub-color:#e23636;color:#e23636;border-color:rgba(226,54,54,0.3)}
.pub-dc{--pub-color:#0476f2;color:#0476f2;border-color:rgba(4,118,242,0.3)}
.pub-image{--pub-color:#4caf7d;color:#4caf7d;border-color:rgba(76,175,125,0.3)}
.pub-dh{--pub-color:#e8a230;color:#e8a230;border-color:rgba(232,162,48,0.3)}
.pub-other{--pub-color:#7a7773;color:#7a7773;border-color:rgba(122,119,115,0.3)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">OMNIBUS VAULT<span>Collection Tracker</span></div>
      <div class="icon-btn" onclick="exportCSV()">&#8595;</div>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="filterbar">
    <div class="chip active" onclick="setFilter(this,'')">All</div>
    <div class="chip" onclick="setFilter(this,'Marvel')">Marvel</div>
    <div class="chip" onclick="setFilter(this,'DC')">DC</div>
    <div class="chip" onclick="setFilter(this,'Image')">Image</div>
    <div class="chip" onclick="setFilter(this,'Dark Horse')">Dark Horse</div>
    <div class="chip" onclick="setFilter(this,'Other')">Other</div>
    <div class="chip" onclick="setFilter(this,'__unread__')">Unread</div>
  </div>
  <div class="sortrow">
    <span class="sort-label">Sort</span>
    <select class="sort-select" id="sort-select" onchange="render()">
      <option value="added">Date added</option>
      <option value="title">Title A-Z</option>
      <option value="paid">Price paid</option>
      <option value="market">Market value</option>
      <option value="date">Purchase date</option>
    </select>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="fab-group">
  <div class="fab fab-scan" onclick="startScanner()">&#128247;</div>
  <div class="fab fab-main" onclick="openDrawer()">+</div>
</div>

<div class="scanner-overlay hidden" id="scanner-overlay">
  <div class="scanner-header">
    <span class="scanner-title">SCAN ISBN</span>
    <button class="scanner-close" onclick="stopScanner()">&#10005;</button>
  </div>
  <video id="scanner-video" playsinline muted></video>
  <div class="scan-frame"><div class="scan-line"></div></div>
  <div class="scan-status" id="scan-status"></div>
  <div class="scan-hint">Point camera at the barcode on the back cover</div>
  <button class="manual-isbn-btn" onclick="manualISBN()">Enter ISBN manually</button>
</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">
    <span id="drawer-title-text">ADD BOOK</span>
    <span class="isbn-badge" id="isbn-badge" style="display:none"></span>
  </div>
  <div class="drawer-body">
    <div class="field">
      <label>Title</label>
      <input id="f-title" placeholder="e.g. Daredevil Omnibus Vol. 4" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Publisher</label>
        <select id="f-pub">
          <option>Marvel</option><option>DC</option><option>Image</option>
          <option>Dark Horse</option><option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Condition</label>
        <select id="f-cond">
          <option value="NM">NM (Near Mint)</option>
          <option value="VF">VF (Very Fine)</option>
          <option value="FN">FN (Fine)</option>
          <option value="VG">VG (Very Good)</option>
          <option value="GD">GD (Good)</option>
          <option value="Read">Read Copy</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Paid ($)</label>
        <input id="f-paid" type="number" placeholder="0.00" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Purchase Date</label>
        <input id="f-date" type="date">
      </div>
    </div>
    <div class="field">
      <label>Read Status</label>
      <select id="f-read">
        <option value="unread">Unread</option>
        <option value="reading">Currently Reading</option>
        <option value="read">Read</option>
      </select>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <input id="f-notes" placeholder="e.g. Signed edition, gift, etc.">
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitBook()">ADD TO VAULT</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var books = [];
var filterPub = '';
var scanLoop = null;
var scannedISBN = null;
var editingId = null;
var STORAGE_KEY = 'omnibus_vault_v2';

function saveBooks() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); } catch(e) {} }
function loadBooks() { try { var d = localStorage.getItem(STORAGE_KEY); if(d) books = JSON.parse(d); } catch(e) { books = []; } }

function toast(msg, dur) {
  if(!dur) dur = 2400;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, dur);
}

function setScanStatus(msg, show) {
  var el = document.getElementById('scan-status');
  el.textContent = msg;
  if(show && msg) { el.classList.add('show'); } else { el.classList.remove('show'); }
}

// SCANNER
function startScanner() {
  document.getElementById('scanner-overlay').classList.remove('hidden');
  setScanStatus('Starting camera...', true);
  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
    .then(function(stream) {
      var video = document.getElementById('scanner-video');
      video.srcObject = stream;
      video.play();
      setScanStatus('Ready - aim at barcode', true);
      if('BarcodeDetector' in window) {
        var detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128'] });
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        scanLoop = setInterval(function() {
          if(!video.videoWidth) return;
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          detector.detect(canvas).then(function(codes) {
            for(var i = 0; i < codes.length; i++) {
              var raw = codes[i].rawValue.replace(/-/g, '');
              if(/^\d{10}$|^\d{13}$/.test(raw)) {
                stopScanner();
                lookupISBN(raw);
                return;
              }
            }
          }).catch(function(){});
        }, 300);
      } else {
        setScanStatus('Auto-scan not supported on this browser', true);
      }
    })
    .catch(function(e) {
      setScanStatus('Camera error: ' + e.message, true);
    });
}

function stopScanner() {
  if(scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  var video = document.getElementById('scanner-video');
  if(video.srcObject) {
    video.srcObject.getTracks().forEach(function(t){ t.stop(); });
    video.srcObject = null;
  }
  document.getElementById('scanner-overlay').classList.add('hidden');
  setScanStatus('', false);
}

function manualISBN() {
  stopScanner();
  var isbn = prompt('Enter ISBN number from back of book:');
  if(isbn) {
    var raw = isbn.replace(/[^0-9X]/gi, '');
    if(raw.length >= 10) {
      lookupISBN(raw);
    } else {
      openDrawer();
    }
  } else {
    openDrawer();
  }
}

// ISBN LOOKUP - Updated to use Google Books API
function lookupISBN(isbn) {
  scannedISBN = isbn;
  toast('Looking up ISBN ' + isbn + '...', 2000);
  
  var url = 'https://www.googleapis.com/books/v1/volumes?q=isbn:' + isbn;
  
  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.totalItems > 0) {
        var book = data.items[0].volumeInfo;
        var title = book.title;
        openDrawer(null, { isbn: isbn });
        document.getElementById('f-title').value = title;
        toast('Found: ' + title, 3000);
      } else {
        toast('Not found - enter manually', 3000);
        openDrawer(null, { isbn: isbn });
      }
    })
    .catch(function(e) {
      toast('Lookup error - enter manually', 3000);
      openDrawer(null, { isbn: isbn });
    });
}

// DRAWER
function openDrawer(id, prefill) {
  editingId = id || null;
  var badge = document.getElementById('isbn-badge');
  var titleText = document.getElementById('drawer-title-text');
  var btn = document.getElementById('submit-btn');

  if(id) {
    var b = books.find(function(x){ return x.id === id; });
    if(!b) return;
    document.getElementById('f-title').value = b.title;
    document.getElementById('f-pub').value = b.pub;
    document.getElementById('f-cond').value = b.cond || 'NM';
    document.getElementById('f-paid').value = b.paid || '';
    document.getElementById('f-date').value = b.purchaseDate || '';
    document.getElementById('f-read').value = b.readStatus || 'unread';
    document.getElementById('f-notes').value = b.notes || '';
    scannedISBN = b.isbn || null;
    badge.style.display = 'none';
    titleText.textContent = 'EDIT BOOK';
    btn.textContent = 'SAVE CHANGES';
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-pub').value = 'Marvel';
    document.getElementById('f-cond').value = 'NM';
    document.getElementById('f-paid').value = '';
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('f-read').value = 'unread';
    document.getElementById('f-notes').value = '';
    if(prefill && prefill.isbn) {
      scannedISBN = prefill.isbn;
      badge.textContent = 'ISBN ' + prefill.isbn;
      badge.style.display = 'inline';
    } else {
      scannedISBN = null;
      badge.style.display = 'none';
    }
    titleText.textContent = 'ADD BOOK';
    btn.textContent = 'ADD TO VAULT';
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function submitBook() {
  var title = document.getElementById('f-title').value.trim();
  if(!title) { toast('Enter a title'); return; }
  var data = {
    title: title,
    pub: document.getElementById('f-pub').value,
    cond: document.getElementById('f-cond').value,
    paid: parseFloat(document.getElementById('f-paid').value) || 0,
    purchaseDate: document.getElementById('f-date').value,
    readStatus: document.getElementById('f-read').value,
    notes: document.getElementById('f-notes').value.trim(),
    isbn: scannedISBN || null
  };
  if(editingId) {
    var idx = books.findIndex(function(x){ return x.id === editingId; });
    if(idx !== -1) books[idx] = Object.assign({}, books[idx], data);
    toast('Updated');
  } else {
    books.unshift(Object.assign({ id: Date.now(), added: Date.now(), market: null, fetching: false }, data));
    toast('Added: ' + title);
  }
  closeDrawer();
  saveBooks();
  render();
}

function deleteBook(id) {
  if(!confirm('Remove this book?')) return;
  books = books.filter(function(b){ return b.id !== id; });
  saveBooks();
  render();
  toast('Removed');
}

// PRICE LOOKUP
function fetchPrice(id) {
  var b = books.find(function(x){ return x.id === id; });
  if(!b || b.fetching) return;
  b.fetching = true;
  render();
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 200,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      system: 'Search eBay sold listings and return ONLY JSON like {"price":89.99}. No markdown.',
      messages: [{ role: 'user', content: 'Average sold eBay price for: "' + b.title + '" (' + b.pub + ' omnibus hardcover). Return only JSON {"price":X}' }]
    })
  })
  .then(function(res){ return res.json(); })
  .then(function(data){
    var text = '';
    if(data.content) { for(var i=0;i<data.content.length;i++) { if(data.content[i].type==='text') text+=data.content[i].text; } }
    var m = text.match(/\{\s*"price"\s*:\s*([\d.]+|null)\s*\}/);
    b.market = m ? JSON.parse(m[0]).price : null;
    b.fetching = false;
    saveBooks();
    render();
  })
  .catch(function(){ b.fetching = false; b.market = null; saveBooks(); render(); });
}

// FILTERS & RENDER
function setFilter(el, val) {
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  filterPub = val;
  render();
}

function pubKey(p) {
  var map = { 'Marvel':'marvel','DC':'dc','Image':'image','Dark Horse':'dh' };
  return map[p] || 'other';
}

function readIcon(s) {
  if(s === 'read') return { dot:'var(--success)', label:'Read' };
  if(s === 'reading') return { dot:'var(--accent)', label:'Reading' };
  return { dot:'var(--border2)', label:'Unread' };
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var sort = document.getElementById('sort-select').value;
  var list = books.slice();
  if(filterPub === '__unread__') list = list.filter(function(b){ return b.readStatus !== 'read'; });
  else if(filterPub) list = list.filter(function(b){ return b.pub === filterPub; });
  if(sort === 'title') list.sort(function(a,b){ return a.title.localeCompare(b.title); });
  else if(sort === 'paid') list.sort(function(a,b){ return b.paid - a.paid; });
  else if(sort === 'market') list.sort(function(a,b){ return (b.market||0)-(a.market||0); });
  else if(sort === 'date') list.sort(function(a,b){ return (b.purchaseDate||'').localeCompare(a.purchaseDate||''); });
  else list.sort(function(a,b){ return b.added - a.added; });

  var container = document.getElementById('list');
  if(!list.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">&#128218;</div><div class="empty-text">' + (books.length ? 'No books match this filter' : 'Your vault is empty.<br>Tap + to add a book or the camera to scan.') + '</div></div>';
  } else {
    container.innerHTML = list.map(function(b) {
      var pk = pubKey(b.pub);
      var rs = readIcon(b.readStatus || 'unread');
      var diff = b.market !== null ? b.market - b.paid : null;
      var diffColor = diff === null ? '' : ('var(' + (diff >= 0 ? '--success' : '--danger') + ')');
      var diffStr = diff === null ? '' : ((diff >= 0 ? '+' : '-') + '$' + Math.abs(diff).toFixed(2));
      var dateStr = b.purchaseDate ? new Date(b.purchaseDate + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
      var priceBlock = b.fetching
        ? '<div class="price-loading">Searching...</div>'
        : b.market !== null
          ? '<div class="price-market">$' + b.market.toFixed(2) + '</div><div class="price-diff" style="color:' + diffColor + '">' + diffStr + '</div>'
          : '<button class="price-lookup-btn" onclick="fetchPrice(' + b.id + ')">Look up</button>';
      return '<div class="book-card pub-' + pk + '">'
        + '<div class="book-main">'
        + '<div class="book-info">'
        + '<div class="book-title">' + escHtml(b.title) + '</div>'
        + '<div class="book-meta">'
        + '<span class="pub-badge pub-' + pk + '">' + b.pub + '</span>'
        + '<span class="cond-badge">' + (b.cond||'NM') + '</span>'
        + '<span class="read-dot" style="background:' + rs.dot + '"></span>'
        + '<span style="font-size:10px;color:var(--muted)">' + rs.label + '</span>'
        + (b.isbn ? '<span style="font-size:10px;color:var(--muted)">ISBN ' + b.isbn + '</span>' : '')
        + '</div>'
        + (b.notes ? '<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic">' + escHtml(b.notes) + '</div>' : '')
        + '</div>'
        + '<div class="book-price-col">'
        + (b.paid > 0 ? '<div class="price-paid">Paid $' + b.paid.toFixed(2) + '</div>' : '<div class="price-paid">No price</div>')
        + priceBlock
        + '</div></div>'
        + '<div class="book-footer">'
        + '<span class="date-tag">' + (dateStr||'No date') + '</span>'
        + '<div class="book-actions">'
        + '<button class="action-btn" onclick="openDrawer(' + b.id + ')">Edit</button>'
        + '<button class="action-btn del" onclick="deleteBook(' + b.id + ')">Remove</button>'
        + '</div></div></div>';
    }).join('');
  }

  var totalPaid = books.reduce(function(s,b){ return s+(b.paid||0); }, 0);
  var priced = books.filter(function(b){ return b.market !== null; });
  var totalMarket = priced.reduce(function(s,b){ return s+b.market; }, 0);
  var readCount = books.filter(function(b){ return b.readStatus === 'read'; }).length;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-n">' + books.length + '</div><div class="stat-l">Books</div></div>'
    + '<div class="stat"><div class="stat-n">$' + (totalPaid < 10000 ? totalPaid.toFixed(0) : (totalPaid/1000).toFixed(1)+'k') + '</div><div class="stat-l">Paid</div></div>'
    + '<div class="stat"><div class="stat-n" style="color:' + (totalMarket > 0 ? 'var(--success)' : 'var(--accent)') + '">$' + (priced.length ? (totalMarket < 10000 ? totalMarket.toFixed(0) : (totalMarket/1000).toFixed(1)+'k') : '-') + '</div><div class="stat-l">Market</div></div>'
    + '<div class="stat"><div class="stat-n">' + readCount + '</div><div class="stat-l">Read</div></div>';
}

function exportCSV() {
  if(!books.length) { toast('Nothing to export'); return; }
  var rows = [['Title','Publisher','Condition','Paid','Market','Difference','Read Status','Purchase Date','ISBN','Notes']];
  books.forEach(function(b) {
    var diff = b.market !== null ? (b.market - b.paid).toFixed(2) : '';
    rows.push(['"'+b.title.replace(/"/g,'""')+'"', b.pub, b.cond||'', b.paid.toFixed(2), b.market!=null?b.market.toFixed(2):'', diff, b.readStatus||'', b.purchaseDate||'', b.isbn||'', '"'+(b.notes||'').replace(/"/g,'""')+'"']);
  });
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(rows.map(function(r){ return r.join(','); }).join('\n'));
  a.download = 'omnibus_vault.csv';
  a.click();
  toast('CSV exported');
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
loadBooks();
render();
</script>
</body>
</html>
