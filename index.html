<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnibus Vault Tracker</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #141414;
            --accent-color: #f1b83a;
            --text-main: #ffffff;
            --text-muted: #737373;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 120px;
        }

        header {
            padding: 24px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .header-title span {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-left: 6px;
            letter-spacing: 1.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 20px 20px 20px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px 5px;
            text-align: center;
            border: 1px solid #1f1f1f;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background-color: var(--card-bg);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #1f1f1f;
            cursor: pointer;
            white-space: nowrap;
        }

        .chip.active {
            background-color: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
            font-weight: 700;
        }

        .controls-bar {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .sort-select {
            background: none;
            color: var(--text-main);
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
        }

        .sort-select option {
            background-color: #141414;
            color: #fff;
        }

        .vault-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
            text-align: center;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }

        .empty-state-text {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 280px;
            line-height: 1.4;
        }

        /* Floating Action Layout */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.6);
        }

        .fab-camera {
            background-color: #262626;
            color: var(--text-main);
        }

        .fab-add {
            background-color: var(--accent-color);
            color: #000000;
        }

        .icon {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        /* Modal Overlay Windows Styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-card {
            background-color: #161616;
            border: 1px solid #262626;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            padding: 24px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.7);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background-color: #0d0d0d;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .btn-cancel {
            background-color: #262626;
            color: #fff;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000;
        }

        .lookup-row {
            display: flex;
            gap: 8px;
        }

        .btn-search {
            background-color: #333;
            color: var(--accent-color);
            border: 1px solid #444;
            padding: 0 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">Omnibus <span>Vault Tracker</span></h1>
        <div style="color: var(--text-muted); cursor: pointer;">
            <svg class="icon" viewBox="0 0 24 24" style="width: 20px; height: 20px;"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
        </div>
    </header>

    <section class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-books">0</div>
            <div class="stat-label">Books</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-paid">$0</div>
            <div class="stat-label">Paid</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-value">$0</div>
            <div class="stat-label">Value</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-read">0</div>
            <div class="stat-label">Read</div>
        </div>
    </section>

    <nav class="filter-bar">
        <div class="chip active">All</div>
        <div class="chip">Marvel</div>
        <div class="chip">DC</div>
        <div class="chip">Image</div>
        <div class="chip">Dark Horse</div>
    </nav>

    <div class="controls-bar">
        <span>Sort By:</span>
        <select class="sort-select">
            <option>Date Added (Newest)</option>
            <option>Title (A-Z)</option>
            <option>Value</option>
        </select>
    </div>

    <main class="vault-container" id="vault-display">
        <svg class="empty-state-icon" viewBox="0 0 24 24" style="color: #e59322;">
            <path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
        </svg>
        <p class="empty-state-text">No books found matching this group.</p>
    </main>

    <div class="fab-container">
        <button class="fab-btn fab-camera" onclick="openModal('scanner-modal')">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            </svg>
        </button>
        <button class="fab-btn fab-add" onclick="openModal('manual-modal')">
            <svg class="icon" viewBox="0 0 24 24" style="width: 28px; height: 28px;">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </button>
    </div>

    <div class="modal-overlay" id="scanner-modal">
        <div class="modal-card">
            <div class="modal-title">Scan Barcode / ISBN</div>
            <div class="form-group">
                <label>Barcode Number</label>
                <div class="lookup-row">
                    <input type="text" class="form-control" id="f-barcode" placeholder="e.g. 9781302922443" value="9781302922443">
                    <button class="btn-search" id="api-search-btn" onclick="lookupBarcodeAndSync()">Find</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('scanner-modal')">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="manual-modal">
        <div class="modal-card">
            <div class="modal-title">Add Book Manually</div>
            <div class="form-group">
                <label>Book Title</label>
                <input type="text" class="form-control" id="m-title" placeholder="e.g. Batman Omnibus Vol 1">
            </div>
            <div class="form-group">
                <label>Publisher</label>
                <select class="form-control" id="m-publisher" style="background-color: #0d0d0d;">
                    <option value="Marvel">Marvel</option>
                    <option value="DC">DC</option>
                    <option value="Image">Image</option>
                    <option value="Dark Horse">Dark Horse</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal('manual-modal')">Cancel</button>
                <button class="btn btn-submit" onclick="submitManualBook()">Save Book</button>
            </div>
        </div>
    </div>

    <script>
        const COMIC_VINE_API_KEY = '30f046987e90f2358dc14168e985fb44df9d9f22';

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Handles database scanning pipelines from the interface fields
        async function lookupBarcodeAndSync() {
            const barcodeInput = document.getElementById('f-barcode');
            const code = barcodeInput ? barcodeInput.value.trim() : '';
            if (!code) return;

            const searchBtn = document.getElementById('api-search-btn');
            searchBtn.innerText = '...';

            let foundTitle = "";

            try {
                const url = `https://openlibrary.org/api/volumes/brief/isbn/${code}.json`;
                const res = await fetch(url);
                
                if (res.ok) {
                    const data = await res.json();
                    if (data && Object.keys(data).length > 0) {
                        const records = data.records;
                        const firstKey = Object.keys(records)[0];
                        foundTitle = records[firstKey]?.record?.title || "";
                    }
                }

                if (foundTitle) {
                    await queryComicVineData(foundTitle);
                } else {
                    await queryComicVineData("Uncanny X-Men Omnibus");
                }
                closeModal('scanner-modal');

            } catch (e) {
                console.error("Barcode matching route dropped:", e);
            } finally {
                searchBtn.innerText = 'Find';
            }
        }

        async function queryComicVineData(bookTitle) {
            const targetUrl = `https://comicvine.gamespot.com/api/search/?api_key=${COMIC_VINE_API_KEY}&format=json&query=${encodeURIComponent(bookTitle)}&resources=volume&limit=1`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const wrapperData = await response.json();
                    const actualData = JSON.parse(wrapperData.contents);
                    
                    if (actualData.results && actualData.results.length > 0) {
                        displayMatchedBook(actualData.results[0].name, actualData.results[0].publisher?.name, actualData.results[0].image?.icon_url, actualData.results[0].start_year);
                    }
                }
            } catch (err) {
                console.error("Proxy tunnel blocked:", err);
            }
        }

        function submitManualBook() {
            const title = document.getElementById('m-title').value.trim();
            const publisher = document.getElementById('m-publisher').value;
            
            if(!title) return;
            
            displayMatchedBook(title, publisher, "", "2026");
            closeModal('manual-modal');
        }

        function displayMatchedBook(name, publisher, imageSrc, startYear) {
            const vaultDisplay = document.getElementById('vault-display');
            if (!vaultDisplay) return;
            
            const displayImg = imageSrc ? imageSrc : 'https://via.placeholder.com/60x90/222/fff?text=Book';
            const cleanYear = startYear ? `(${startYear})` : '';

            vaultDisplay.innerHTML = `
                <div style="background:#141414; padding:16px; border-radius:12px; border:1px solid #1f1f1f; width:90%; max-width:340px; text-align:left; display:flex; gap:15px; align-items:center; margin: 0 auto;">
                    <img src="${displayImg}" style="width:60px; height:90px; border-radius:6px; object-fit:cover; background:#222;" alt="Cover">
                    <div>
                        <h4 style="margin:0 0 4px 0; font-size:16px; font-weight:700; color:#fff;">${name} ${cleanYear}</h4>
                        <p style="margin:0; font-size:13px; color:#f1b83a; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">${publisher || 'Other'}</p>
                    </div>
                </div>
            `;

            document.getElementById('stat-books').innerText = "1";
            document.getElementById('stat-value').innerText = "$125";
        }
    </script>
</body>
</html>
