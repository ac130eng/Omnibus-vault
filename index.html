<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Omnibus Vault</title>
<style>
:root{--bg:#0f0e0d;--bg2:#1a1917;--bg3:#242320;--border:rgba(255,255,255,0.08);--text:#f0ede8;--accent:#e8a230;--muted:#7a7773}
body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.topbar{padding:20px 16px;border-bottom:1px solid var(--border)}
.logo{font-size:24px;color:var(--accent);font-weight:bold}
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--bg2);padding:10px}
.stat{text-align:center}
.stat-n{color:var(--accent);font-size:18px}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase}
.list{flex:1;overflow-y:auto;padding:16px}
.fab{position:fixed;bottom:20px;right:20px;background:var(--accent);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.drawer{position:fixed;bottom:0;width:100%;max-width:480px;background:var(--bg2);padding:20px;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .3s}
.drawer.open{transform:translateY(0)}
.field{margin-bottom:15px}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="logo">OMNIBUS VAULT</div></div>
  <div class="stats">
    <div class="stat"><div class="stat-n">0</div><div class="stat-l">Books</div></div>
    <div class="stat"><div class="stat-n">$0</div><div class="stat-l">Paid</div></div>
    <div class="stat"><div class="stat-n">-</div><div class="stat-l">Market</div></div>
    <div class="stat"><div class="stat-n">0</div><div class="stat-l">Read</div></div>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="fab" onclick="document.getElementById('drawer').classList.add('open')">+</div>

<div class="drawer" id="drawer">
  <div class="field"><input placeholder="Title" id="f-title"></div>
  <button class="fab" style="position:static;width:100%;border-radius:4px" onclick="document.getElementById('drawer').classList.remove('open')">ADD BOOK</button>
</div>

<script>
console.log("Phase 1 loaded");
</script>
</body>
</html>
