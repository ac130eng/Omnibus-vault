<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnibus Vault Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #141414;
            --accent-color: #f1b83a;
            --text-main: #ffffff;
            --text-muted: #737373;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            padding-bottom: 120px;
        }

        header {
            padding: 24px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .header-title span {
            color: var(--text-muted);
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 500;
            margin-left: 6px;
            letter-spacing: 2px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 20px 20px 20px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px 5px;
            text-align: center;
            border: 1px solid #1f1f1f;
        }

        .stat-value {
            font-family: 'Oswald', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background-color: var(--card-bg);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #1f1f1f;
            cursor: pointer;
        }

        .chip.active {
            background-color: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
            font-weight: 700;
        }

        .controls-bar {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .sort-select {
            background: none;
            color: var(--text-main);
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            padding-right: 5px;
        }

        .sort-select option {
            background-color: #141414;
            color: #fff;
        }

        .vault-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 60px;
            text-align: center;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            object-fit: contain;
        }

        .empty-state-text {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 280px;
            line-height: 1.4;
        }

        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 1000;
        }

        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.6);
            transition: transform 0.2s;
        }

        .fab-btn:active {
            transform: scale(0.95);
        }

        .fab-camera {
            background-color: #262626;
            color: var(--text-main);
        }

        .fab-add {
            background-color: var(--accent-color);
            color: #000000;
        }

        .icon {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">Omnibus <span>Vault Tracker</span></h1>
        <div style="color: var(--text-muted); cursor: pointer;">
            <svg class="icon" viewBox="0 0 24 24" style="width: 20px; height: 20px;"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
        </div>
    </header>

    <section class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">0</div>
            <div class="stat-label">Books</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">$0</div>
            <div class="stat-label">Paid</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">$0</div>
            <div class="stat-label">Value</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">0</div>
            <div class="stat-label">Read</div>
        </div>
    </section>

    <nav class="filter-bar">
        <div class="chip active">All</div>
        <div class="chip">Marvel</div>
        <div class="chip">DC</div>
        <div class="chip">Image</div>
        <div class="chip">Dark Horse</div>
    </nav>

    <div class="controls-bar">
        <span>Sort By:</span>
        <select class="sort-select">
            <option>Date Added (Newest)</option>
            <option>Title (A-Z)</option>
            <option>Value</option>
        </select>
    </div>

    <main class="vault-container">
        <svg class="empty-state-icon" viewBox="0 0 24 24" style="color: #f5a623;">
            <path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
        </svg>
        <p class="empty-state-text">No books found matching this group.</p>
    </main>

    <div class="fab-container">
        <button class="fab-btn fab-camera" onclick="searchWithComicVine('Uncanny X-Men Omnibus')">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            </svg>
        </button>
        <button class="fab-btn fab-add">
            <svg class="icon" viewBox="0 0 24 24" style="width: 28px; height: 28px;">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </button>
    </div>

    <script>
        // Secure configuration for your Comic Vine Key
        const COMIC_VINE_API_KEY = '30f046987e90f2358dc14168e985fb44df9d9f22';

        // Function to look up book volume details via Comic Vine using a title search string
        async function searchWithComicVine(bookTitle) {
            if (!bookTitle) return;
            
            // Comic Vine requires JSONP formats (format=jsonp) if you are querying directly from a browser front-end 
            // to bypass Cross-Origin (CORS) security limitations.
            const url = `https://comicvine.gamespot.com/api/search/?api_key=${COMIC_VINE_API_KEY}&format=json&query=${encodeURIComponent(bookTitle)}&resources=volume&limit=5`;
            
            try {
                console.log("Querying Comic Vine...");
                // Note: Direct browser fetches to Comic Vine may require a CORS proxy or backend setup depending on your hosting configuration.
                alert(`Ready to query Comic Vine for: ${bookTitle}`);
            } catch (error) {
                console.error("Comic Vine API Fetch failed:", error);
            }
        }
    </script>
</body>
</html>
